<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      body {
        margin: 0;
        padding: 0%;
        font-family: sans-serif;
        background-color: rgba(56, 78, 202, 0.877);
      }
      .box {
        width: 300px;
        padding: 40px;
        text-align: center;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 1px solid black;
        border-radius: 2px;
        background: #191919;
      }
      .box input[type="text"],
      input[type="password"] {
        background: none;
        margin: 20px auto;
        border: 0;
        display: block;
        border: 2px solid #3498db;
        padding: 14px;
        width: 200px;
        outline: none;
        color: white;
        border-radius: 24px;
        transition: 0.25s;
      }

      .box h1 {
        color: rgb(255, 255, 255);
        font-weight: 700;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        transform: uppercase;
      }

      .box input[type="text"]:focus,
      input[type="password"]:focus {
        width: 288px;
        color: tomato;
        border-radius: 30px;
        border: 2px solid rgb(52, 235, 113);
      }

      .box input[type="submit"] {
        background: none;
        margin: 20px auto;
        border: 0;
        display: block;
        border: 2px solid rgb(52, 235, 113);
        padding: 14px 40px;

        outline: none;
        color: white;
        border-radius: 24px;
        transition: 1s;
      }

      .box input[type="submit"]:hover {
        background-color: rgb(52, 235, 113);
        border: 2px solid rgb(52, 235, 113);
        cursor: pointer;

        transition: 1s;
      }
    </style>
  </head>
  <body>
    <form class="box" action="/Payment Form/Payment_Form.html">
      <h1>LOGIN</h1>
      <input type="text" name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <input type="submit" value="Login" />
    </form>
  </body>
</html>
